<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <style>
      .logo-name {
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif;
        font-size: 46px;
        font-style: italic;
        font-weight: 400;
        fill: #1a5c3a;
        letter-spacing: 1px;
      }
      .logo-line {
        stroke: #1a5c3a;
        stroke-width: 1.2;
      }
      .shield-fill { fill: none; stroke: #1a2a20; stroke-width: 2.5; stroke-linejoin: round; }
      .shield-inner { fill: none; stroke: #1a2a20; stroke-width: 1.8; stroke-linejoin: round; }
      .g-letter { fill: #1a2a20; }
    </style>
  </defs>

  <!-- SHIELD OUTER -->
  <path class="shield-fill" d="M250 18 L285 32 L285 68 Q285 96 250 112 Q215 96 215 68 L215 32 Z"/>
  <!-- SHIELD INNER -->
  <path class="shield-inner" d="M250 26 L278 38 L278 67 Q278 90 250 104 Q222 90 222 67 L222 38 Z"/>

  <!-- G LETTER inside shield -->
  <text x="250" y="84" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="700" font-style="normal"
        fill="#1a2a20" letter-spacing="-2">G</text>

  <!-- NAME TEXT -->
  <text class="logo-name" x="250" y="150" text-anchor="middle">Syed Muhammad Ali Gillani</text>

  <!-- Decorative lines -->
  <line class="logo-line" x1="60" y1="160" x2="205" y2="160"/>
  <line class="logo-line" x1="295" y1="160" x2="440" y2="160"/>

  <!-- Diamond -->
  <polygon points="250,153 256,160 250,167 244,160" fill="#1a5c3a"/>
</svg>